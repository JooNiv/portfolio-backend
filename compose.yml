services:
  db:
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: password
    volumes:
      - pgdata:/var/lib/postgresql/data

  migrate:
    image: migrate/migrate
    depends_on:
      - db
    volumes:
      - ./migrations:/migrations
    command: [
      "-path", "/migrations",
      "-database", "postgres://postgres:password@db:5432/postgres?sslmode=disable",
      "up"
    ]

  backend:
    build: .
    depends_on:
      - db
      - migrate
    ports:
      - "8698:8698"
    env_file:
      - .env

volumes:
  pgdata: